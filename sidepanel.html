<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidepanel.css">
  <title>QuickCopy — Side Panel</title>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      </svg>
      <span class="logo-text">QuickCopy</span>
      <span class="badge-panel">Side Panel</span>
    </div>
    <button id="btnAddSnippet" class="btn-header-action" title="Nuevo snippet">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </header>

  <!-- TABS NAVIGATION -->
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="tabSnippets">Snippets</button>
    <button class="tab-btn" data-tab="tabQuickLinks">Enlaces Rápidos</button>
  </div>

  <!-- TAB: SNIPPETS -->
  <div id="tabSnippets" class="tab-pane active">
    <!-- SEARCH -->
    <div class="search-wrapper">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar snippets...">
    </div>

    <!-- CATEGORIES -->
    <div class="categories-bar">
      <div class="categories-scroll" id="categoriesList"></div>
      <button id="btnAddCategory" class="btn-add-cat" title="Nueva categoría">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- CATEGORY FORM -->
    <div class="category-form" id="categoryForm">
      <div class="category-form-inner">
        <input type="text" id="catNameInput" class="cat-name-input"
          placeholder="Nombre de la categoría" maxlength="30">
        <div class="color-picker" id="colorPicker"></div>
        <div class="category-form-actions">
          <button id="cancelCatBtn" class="btn btn-ghost btn-sm">Cancelar</button>
          <button id="saveCatBtn" class="btn btn-primary btn-sm">Añadir</button>
        </div>
      </div>
    </div>

    <!-- SNIPPETS LIST -->
    <div class="snippets-scroll">
      <div class="snippets-list" id="snippetsList"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <p class="empty-title">No hay snippets</p>
        <p class="empty-desc">Pulsa <strong>+</strong> para guardar tu primer texto</p>
      </div>
    </div>
  </div>

  <!-- TAB: QUICK LINKS -->
  <div id="tabQuickLinks" class="tab-pane">
    <div class="quicklinks-section" id="quicklinksSection">
    <div class="quicklinks-header" id="quicklinksToggle">
      <div class="quicklinks-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span>Enlaces Rápidos</span>
      </div>
      <div class="quicklinks-header-actions">
        <button id="btnEditLinks" class="btn-ql-action" title="Editar enlaces">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button id="btnOpenLinks" class="btn-open-links" title="Abrir ambos enlaces">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          <span>Abrir</span>
        </button>
      </div>
    </div>

    <div class="quicklinks-body" id="quicklinksBody">
      <div class="ql-view" id="qlView">
        <div class="ql-link-row" id="qlRow1">
          <div class="ql-link-dot"></div>
          <span class="ql-link-name" id="qlName1">Sin configurar</span>
          <span class="ql-link-url" id="qlUrl1"></span>
        </div>
        <div class="ql-link-row" id="qlRow2">
          <div class="ql-link-dot"></div>
          <span class="ql-link-name" id="qlName2">Sin configurar</span>
          <span class="ql-link-url" id="qlUrl2"></span>
        </div>
      </div>
      <div class="ql-edit" id="qlEdit" style="display:none">
        <div class="ql-edit-group">
          <span class="ql-edit-label">Enlace 1</span>
          <input type="text" id="qlEditName1" class="ql-input" placeholder="Nombre" maxlength="40">
          <input type="url" id="qlEditUrl1" class="ql-input" placeholder="https://ejemplo.com">
        </div>
        <div class="ql-edit-group">
          <span class="ql-edit-label">Enlace 2</span>
          <input type="text" id="qlEditName2" class="ql-input" placeholder="Nombre" maxlength="40">
          <input type="url" id="qlEditUrl2" class="ql-input" placeholder="https://ejemplo.com">
        </div>
        <div class="ql-edit-actions">
          <button id="qlCancelBtn" class="btn btn-ghost btn-sm">Cancelar</button>
          <button id="qlSaveBtn" class="btn btn-primary btn-sm">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SNIPPET MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nuevo Snippet</h2>
        <button id="btnCloseModal" class="btn-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="snippetTitleInput">Título</label>
          <input type="text" id="snippetTitleInput" placeholder="Ej: Saludo formal" maxlength="80">
        </div>
        <div class="form-group">
          <label for="snippetTextInput">Texto a copiar</label>
          <textarea id="snippetTextInput" rows="5"
            placeholder="Escribe o pega aquí el texto..."></textarea>
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <div class="category-tabs" id="modalCategoryTabs"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelSnippetBtn" class="btn btn-ghost">Cancelar</button>
        <button id="saveSnippetBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal modal-sm">
      <div class="modal-body" style="padding-top:24px">
        <p class="confirm-text" id="confirmText"></p>
      </div>
      <div class="modal-footer">
        <button id="confirmCancelBtn" class="btn btn-ghost">Cancelar</button>
        <button id="confirmOkBtn" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toastMsg">¡Copiado!</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
